<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Código</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='cadastro.css') }}">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

<div class="wrapper">
    <form action="/validar_reset" method="POST">
        <h1>Verificar Código</h1>

        <input type="hidden" name="token" value="{{ token }}">

        <div class="caixa">
            <input type="text" name="codigo" placeholder="Digite o código (6 dígitos)" maxlength="6" required>
            <i class='bx bx-key'></i>
        </div>

        {% if erro %}
            <p class="erro-confirmacao">{{ erro }}</p>
        {% endif %}

        <button type="submit" class="btn">Validar Código</button>
    </form>
</div>

</body>
</html>
