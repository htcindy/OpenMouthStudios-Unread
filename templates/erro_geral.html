<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Erro no Sistema</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/LOGO_UNREAD.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #09020A;
            background-image: url("img/library background.jpeg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .wrapper {
            width: 420px;
            background: transparent;
            border: 2px solid #341364;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 10px rgba(0, 0, 0, .2);
            color: aliceblue;
            border-radius: 10px;
            padding: 30px 40px;
            text-align: center;
        }

        .wrapper h1 {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 10px;
            color: aliceblue;
        }

        .wrapper p {
            font-size: 14px;
            color: rgba(240, 248, 255, 0.75);
            margin-bottom: 20px;
        }

        .wrapper p.sub {
            font-size: 12px;
            color: rgba(240, 248, 255, 0.45);
            margin-top: -14px;
            margin-bottom: 24px;
        }

        .wrapper .btn {
            width: 100%;
            height: 45px;
            background: #341364;
            border: none;
            border-radius: 40px;
            box-shadow: 0 0 15px rgba(0, 0, 0, .5);
            cursor: pointer;
            font-size: 15px;
            color: #fff;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
            margin-bottom: 12px;
        }

        .wrapper .btn:hover {
            opacity: 0.85;
        }

        .wrapper .btn-ghost {
            width: 100%;
            height: 45px;
            background: transparent;
            border: 1.5px solid rgba(52, 19, 100, 0.6);
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            color: rgba(240, 248, 255, 0.65);
            font-weight: 400;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .wrapper .btn-ghost:hover {
            opacity: 0.7;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 14px;
            color: #f4a0a0;
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(52, 19, 100, 0.5);
            margin: 20px 0;
        }

        .error-code {
            font-size: 11px;
            color: rgba(240, 248, 255, 0.25);
            letter-spacing: 0.08em;
            margin-top: 18px;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="icon">⚠️</div>
        <h1>Algo não deu certo...</h1>
        <p>Não conseguimos processar sua solicitação agora.</p>
        <p class="sub">Tente novamente em alguns instantes.</p>
        <hr class="divider">
        <a href="/jogo" class="btn">Voltar para o Início</a>
        <a href="javascript:location.reload()" class="btn-ghost">Recarregar página</a>
        <p class="error-code">ERRO • REF: #SYS-503</p>
    </div>
</body>
</html>
